name = "HexGF2"

[[lean_lib]]
name = "HexPolyZ"

[[lean_lib]]
name = "HexLLL"

[[lean_lib]]
name = "HexPolyFp"

[[lean_lib]]
name = "HexGfqRing"

[[lean_lib]]
name = "HexGfqField"

[[lean_lib]]
name = "HexBerlekamp"

[[lean_lib]]
name = "HexHensel"

[[lean_lib]]
name = "HexConway"

[[lean_lib]]
name = "HexGfq"

[[lean_lib]]
name = "HexBerlekampZassenhaus"

[[lean_lib]]
name = "HexPolyMathlib"
