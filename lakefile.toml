name = "Hex"
version = "0.1.0"
defaultTargets = ["HexManual"]

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso.git"
rev = "v4.30.0-rc2"

[[lean_lib]]
