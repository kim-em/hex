name = "hex"
version = "0.1.0"
defaultTargets = [
  "HexArith",
  "HexPoly",
  "HexMatrix",
  "HexModArith",
  "HexGramSchmidt",
  "HexGf2",
  "HexPolyZ",
  "HexLll",
  "HexPolyFp",
  "HexGfqRing",
  "HexGfqField",
  "HexBerlekamp",
